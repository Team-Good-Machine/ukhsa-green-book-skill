[tools]
bun = "latest"
"npm:typescript-language-server" = "latest"

[settings]
npm.package_manager = "bun"

[tasks.bundle]
description = "Install dependencies"
run = "bun install"

[tasks.scrape]
description = "Scrape Green Book chapters from gov.uk"
depends = ["bundle"]
run = "bun run src/scrape.ts"

[tasks.package]
description = "Package skill into distributable zip"
depends = ["bundle"]
run = "bun run src/package.ts"

[tasks.release]
description = "Scrape, generate, package"
run = "mise scrape && mise generate && mise package"

[tasks.typecheck]
description = "Run TypeScript type checker"
run = "bun run typecheck"

[tasks.test]
description = "Run tests"
raw = true
run = "bun test"

[tasks.format]
description = "Check formatting"
run = "bunx prettier --check src/"

[tasks."format:fix"]
description = "Fix formatting"
run = "bunx prettier --write src/"

[tasks.ci]
description = "Run all checks in parallel"
run = "mise typecheck ::: test ::: format"
