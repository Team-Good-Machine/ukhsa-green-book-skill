name: Check for Green Book updates

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v3
        with: { cache: true, install: true }

      - run: mise scrape

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet pdfs/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "## Changed files" >> "$GITHUB_STEP_SUMMARY"
            git diff --name-only pdfs/ >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Create PR
        if: steps.diff.outputs.changed == 'true'
        run: |
          BRANCH="auto-update/$(date +%Y-%m-%d)"
          git checkout -b "$BRANCH"
          git add pdfs/ src/manifest.json
          git commit -m "chore: Update Green Book PDFs

          Automated scrape detected changed PDFs from gov.uk."
          git push -u origin "$BRANCH"
          gh pr create \
            --title "Update Green Book PDFs $(date +%Y.%m.%d)" \
            --body "Automated update — review changed PDFs and re-convert affected chapters before merging."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
