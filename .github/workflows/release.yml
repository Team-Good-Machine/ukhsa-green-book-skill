name: Release

on:
  push:
    branches: [main]
    paths:
      - "chapters/**"
      - "figures/**"
      - "SKILL.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v3
        with: { cache: true, install: true }

      - run: mise package

      - name: Create release
        run: |
          VERSION=$(date +%Y.%m.%d)
          TAG="v${VERSION}"
          if gh release view "$TAG" &>/dev/null; then
            PATCH=1
            while gh release view "${TAG}.${PATCH}" &>/dev/null; do
              PATCH=$((PATCH + 1))
            done
            TAG="${TAG}.${PATCH}"
          fi
          gh release create "$TAG" \
            green-book-skill-*.zip \
            --title "Green Book Skill ${TAG#v}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
